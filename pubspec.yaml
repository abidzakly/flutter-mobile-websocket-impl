name: socket_demo
description: Production-ready Raw TCP Socket client with BLoC state management.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Raw TCP Socket — menggunakan dart:io Socket
  # (dart:io sudah built-in, tidak perlu package eksternal)

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # DI
  get_it: ^7.7.0

  # Utilities
  equatable: ^2.0.5

  # Security
  flutter_secure_storage: ^9.2.2  # Simpan JWT token di Keychain/Keystore
  crypto: ^3.0.3                  # HMAC-SHA256 payload signing

  # ID generation
  uuid: ^4.4.2

  # Network monitoring
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
