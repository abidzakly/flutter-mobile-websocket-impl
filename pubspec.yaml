name: socket_demo
description: Production-ready WebSocket client with BLoC state management.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # WebSocket — menggunakan dart:io WebSocket (raw socket di atas TCP)
  # Tidak perlu package eksternal; dart:io sudah menyediakan WebSocket class

  # State Management
  flutter_bloc: ^8.1.6       # BLoC pattern untuk state management
  bloc: ^8.1.4

  # DI (Dependency Injection)
  get_it: ^7.7.0             # Service locator

  # Networking & Serialization
  equatable: ^2.0.5          # Value equality untuk BLoC state/event
  json_annotation: ^4.9.0   # Anotasi untuk JSON serialization

  # Security
  flutter_secure_storage: ^9.2.2  # Simpan token di Keychain/Keystore
  crypto: ^3.0.3                  # HMAC/SHA untuk signing payload

  # Utilities
  uuid: ^4.4.2               # Generate request ID
  connectivity_plus: ^6.0.5  # Monitor koneksi jaringan
  requests_inspector: ^4.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
